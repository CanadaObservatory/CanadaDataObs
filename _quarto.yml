project:
  type: website
  output-dir: _site
  execute-dir: project
  # Render ONLY .qmd pages: without this list Quarto also renders root-level .md
  # files — CLAUDE.md and OVERVIEW.md (internal notes) were being published as
  # /CLAUDE.html and /OVERVIEW.html and indexed into the site search.
  render:
    - "*.qmd"
    - "**/*.qmd"
  # The brand kit must be declared explicitly: Quarto only copies *referenced*
  # resources, and the absolute-URL icon links in _includes/brand-head.html are
  # invisible to its resource discovery. visual_assets/initial_drafts/ (internal
  # archive) stays unpublished automatically — nothing references it.
  # No trailing slash: "visual_assets/brand/" makes Quarto ALSO copy the dir's
  # contents flattened into _site/visual_assets/ (rsync-style), duplicating the kit.
  resources:
    - visual_assets/brand

