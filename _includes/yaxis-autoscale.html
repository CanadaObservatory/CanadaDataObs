<!--
  Dynamic y-axis autoscale (site-wide, via _quarto.yml format.html.include-after-body).

  Problem: a chart opens on a recent x-window but keeps a FIXED y-range, so when the reader
  widens the window (rangeselector / rangeslider / box-zoom) the y-scale doesn't follow —
  recent variation looks flat against historical extremes (1980s rates, the 2022 inflation
  spike). Plotly's "Autoscale" resets BOTH axes, which is not what we want.

  This rescales ONLY the y-axis to the data visible in the current x-window, on every x-range
  change. Charts opt in from the Python builder via layout.meta:
      fig.update_layout(meta=dict(autoscaleY=True))
  or with options:
      fig.update_layout(meta=dict(autoscaleY=dict(include=[0, 3], padFrac=0.08, min=-5, max=12)))
    include : y-values always kept in range (e.g. the 1–3% target band + the zero baseline)
    padFrac : fractional padding above/below the visible extent (default 0.08)
    min/max : hard clamps the computed range never exceeds

  Mirrors _includes/peer-legend-colours.html: resolve Plotly via requirejs (Quarto's AMD bundle
  leaves window.Plotly undefined), bounded-poll for async-rendered charts, wire each opted-in
  chart once. The x-only relayout filter + a busy flag prevent feedback loops; a
  requestAnimationFrame debounce keeps slider-drag smooth.
-->
<script>
(function () {
  "use strict";

  function plotly() {
    if (window.Plotly) return window.Plotly;
    try { if (window.requirejs) return window.requirejs("plotly"); } catch (e) {}
    return null;
  }

  // Read the opt-in flag from layout.meta (with a _fullLayout fallback).
  function cfg(gd) {
    var m = (gd.layout && gd.layout.meta) || (gd._fullLayout && gd._fullLayout.meta);
    var a = m && m.autoscaleY;
    if (!a) return null;
    if (a === true) a = {};
    return {
      include: a.include || [],
      padFrac: (typeof a.padFrac === "number") ? a.padFrac : 0.08,
      min: (typeof a.min === "number") ? a.min : null,
      max: (typeof a.max === "number") ? a.max : null
    };
  }

  // Convert an x value (data point or axis-range bound) to a comparable number.
  function xNum(v, isDate) {
    if (v === null || v === undefined) return NaN;
    if (typeof v === "number") return v;
    if (isDate) { var t = Date.parse(v); if (!isNaN(t)) return t; }
    return Number(v);
  }

  function rescale(gd, P, opts) {
    var xa = gd._fullLayout && gd._fullLayout.xaxis;
    if (!xa || !xa.range) return;
    var isDate = xa.type === "date";
    var x0 = xNum(xa.range[0], isDate), x1 = xNum(xa.range[1], isDate);
    if (x0 > x1) { var tmp = x0; x0 = x1; x1 = tmp; }

    var ymin = Infinity, ymax = -Infinity, sawPoint = false;

    // Prefer calcdata: Plotly stores x/y already converted to axis-numeric values
    // there, and — crucially — decoded. In Plotly 6 the raw gd.data arrays are
    // base64 typed-array specs ({dtype, bdata}), not plain arrays, so reading
    // gd.data[i].y yields no usable numbers and the rescale would silently fall
    // back to the `include` band only. calcdata sidesteps both the b64 encoding
    // and the date-string parsing; legendonly/hidden traces carry no real points.
    var cd = gd.calcdata;
    if (cd && cd.length) {
      cd.forEach(function (pts) {
        if (!pts || !pts.length) return;
        for (var k = 0; k < pts.length; k++) {
          var p = pts[k];
          var xv = p.x, yv = p.y;
          if (typeof xv !== "number" || xv !== xv) continue;   // missing/placeholder x
          if (!(xv >= x0 && xv <= x1)) continue;
          if (typeof yv !== "number" || yv !== yv) continue;    // null / NaN / BADNUM
          sawPoint = true;
          if (yv < ymin) ymin = yv;
          if (yv > ymax) ymax = yv;
        }
      });
    }

    // Fallback for any chart without calcdata: read the raw arrays (decoding a
    // typed-array spec via its _inputArray if present).
    if (!sawPoint) {
      var realArr = function (a) {
        if (!a) return null;
        if (Array.isArray(a)) return a;
        if (a._inputArray) return a._inputArray;            // Plotly-stashed decoded copy
        if (typeof a.length === "number") return a;          // already a typed array
        return null;
      };
      (gd.data || []).forEach(function (tr) {
        if (tr.visible === "legendonly" || tr.visible === false) return;
        var xs = realArr(tr.x), ys = realArr(tr.y);
        if (!xs || !ys) return;
        for (var k = 0; k < xs.length; k++) {
          var xv = xNum(xs[k], isDate);
          if (!(xv >= x0 && xv <= x1)) continue;
          var yv = ys[k];
          if (yv === null || yv === undefined || yv !== yv) continue; // null / NaN
          yv = +yv;
          if (yv < ymin) ymin = yv;
          if (yv > ymax) ymax = yv;
        }
      });
    }
    opts.include.forEach(function (v) {
      if (v < ymin) ymin = v;
      if (v > ymax) ymax = v;
    });
    if (ymin === Infinity) return;                       // nothing visible in the window

    var span = ymax - ymin;
    var pad = span > 0 ? span * opts.padFrac : Math.max(Math.abs(ymax) * 0.1, 0.5);
    var lo = ymin - pad, hi = ymax + pad;
    if (opts.min !== null && lo < opts.min) lo = opts.min;
    if (opts.max !== null && hi > opts.max) hi = opts.max;
    if (!(hi > lo)) return;

    gd._yAutoBusy = true;
    var done = function () { gd._yAutoBusy = false; };
    P.relayout(gd, { "yaxis.range": [lo, hi] }).then(done, done);
  }

  function wire(gd, P) {
    if (typeof gd.on !== "function" || !gd.data) return;   // not initialised yet
    if (gd._yAutoSkip) return;                             // known not-opted-in
    var opts = cfg(gd);
    if (!opts) { gd._yAutoSkip = true; return; }           // not opted in — skip for good

    // Build the handlers ONCE and stash them on gd. We then (re)bind them on EVERY sweep
    // tick (see below) — Quarto/Plotly can hand us a graph div whose event emitter isn't
    // ready yet (or gets recreated on first full draw), silently dropping a one-time
    // binding; the listeners would then never fire (the dropdown/slider refit just
    // wouldn't happen). Re-adding each tick, after removing the prior copy, guarantees
    // exactly one live binding once Plotly has settled, with no duplicates.
    if (!gd._yAuto) {
      var timer = null;
      // Debounce via setTimeout, NOT requestAnimationFrame: rAF is throttled (or never
      // fires) in background/inactive tabs, which would leave the timer stuck and kill
      // every later rescale. A short timer coalesces rapid slider events just as well.
      var schedule = function () {
        if (timer) return;
        timer = setTimeout(function () { timer = null; rescale(gd, P, opts); }, 60);
      };
      var onRelayout = function (ev) {
        if (gd._yAutoBusy) return;                          // ignore our own y relayout
        if (!ev) return;
        var xChanged = ("xaxis.autorange" in ev) || ("xaxis.range" in ev) ||
                       ("xaxis.range[0]" in ev) || ("xaxis.range[1]" in ev);
        if (!xChanged) return;
        schedule();
      };
      // Refit when the VISIBLE DATA changes within the same x-window: an age/category
      // dropdown swaps each trace's y via Plotly.restyle (Youth unemployment runs higher
      // than the Total), and legend clicks toggle visibility — both fire restyle/update,
      // not relayout. No _yAutoBusy guard: our refit uses Plotly.relayout (emits
      // plotly_relayout, never restyle/update), so a data change can't self-trigger.
      gd._yAuto = { schedule: schedule, onRelayout: onRelayout, onData: schedule };
    }

    var h = gd._yAuto;
    if (typeof gd.removeListener === "function") {
      gd.removeListener("plotly_relayout", h.onRelayout);
      gd.removeListener("plotly_restyle", h.onData);
      gd.removeListener("plotly_update", h.onData);
    }
    gd.on("plotly_relayout", h.onRelayout);
    gd.on("plotly_restyle", h.onData);
    gd.on("plotly_update", h.onData);

    if (!gd._yAutoFit) { gd._yAutoFit = true; h.schedule(); }   // fit the opening window once
  }

  function sweep() {
    var P = plotly();
    if (!P) return;
    var divs = document.querySelectorAll(".plotly-graph-div, .js-plotly-plot");
    Array.prototype.forEach.call(divs, function (gd) { wire(gd, P); });
  }

  // Bounded poll: catch charts as Quarto renders them, then stop (mirrors peer-legend-colours).
  function start() {
    sweep();
    var ticks = 0;
    var timer = setInterval(function () {
      sweep();
      if (++ticks >= 40) clearInterval(timer);             // ~12s at 300ms, then give up
    }, 300);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", start);
  } else {
    start();
  }
})();
</script>
