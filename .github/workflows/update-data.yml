name: Update Data and Deploy

on:
  schedule:
    # Daily at 14:00 UTC — after StatCan's 08:30 ET release window (12:30 UTC EDT /
    # 13:30 UTC EST), so same-day releases are picked up. Catches monthly/quarterly
    # numbers within a day instead of up to a week (releases span Tue/Thu/Fri, so no
    # single weekly day suffices). The commit step is gated on real data changes
    # (git diff --staged --quiet), so quiet days are no-ops — no commit, no deploy.
    - cron: '0 14 * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    # Only fetch fresh data on schedule or manual trigger, not on every push
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data pipeline
        run: python -m pipeline.run_pipeline
        timeout-minutes: 5
        continue-on-error: true  # Don't fail deploy if one source is down

      - name: Check NRCan elevation tile service (Elevation-page basemap)
        # The Elevation page streams NRCan's live CBME hillshade as its relief base. NRCan has
        # migrated endpoints before, so ping it weekly and surface a warning (not a failure) if it
        # changes — the fix is a one-line URL update, or activate pipeline/build_elevation_tiles.py.
        run: |
          URL="https://maps-cartes.services.geo.ca/server2_serveur2/rest/services/BaseMaps/CBME_CBCE_HS_RO_3978/MapServer?f=json"
          code=$(curl -s -o /tmp/cbme.json -w "%{http_code}" --max-time 30 "$URL" || echo "000")
          if [ "$code" = "200" ] && grep -q "tileInfo" /tmp/cbme.json; then
            echo "NRCan CBME hillshade service OK ($code)."
          else
            echo "::warning title=Elevation basemap::NRCan CBME hillshade returned '$code' or an unexpected body — the Elevation page relief may be blank. Verify the endpoint, or activate the self-hosted fallback (pipeline/build_elevation_tiles.py)."
          fi
        continue-on-error: true

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update data files [automated]"
          git push

  deploy:
    needs: update-data
    # Run deploy even if update-data was skipped (on push) or failed
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # Get latest including data updates

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: quarto render

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
